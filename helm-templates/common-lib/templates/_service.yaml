{{/*
================================================================================
  common-lib/_service.yaml
  Reusable template that renders a Kubernetes Service resource.
================================================================================
*/}}
{{- define "common-lib.service" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "common-lib.fullname" . }}
  labels:
    {{- include "common-lib.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.service.port | default 80 }}
      targetPort: {{ .Values.service.targetPort | default (.Values.deployment.containerPort | default 80) }}
      protocol: TCP
      name: http
  selector:
    {{- include "common-lib.selectorLabels" . | nindent 4 }}
{{- end }}
