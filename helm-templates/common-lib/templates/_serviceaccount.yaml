{{/*
================================================================================
  common-lib/_serviceaccount.yaml
  Reusable template that renders a Kubernetes ServiceAccount resource.
================================================================================
*/}}
{{- define "common-lib.serviceAccount" -}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "common-lib.serviceAccountName" . }}
  labels:
    {{- include "common-lib.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
{{- end }}
{{- end }}
