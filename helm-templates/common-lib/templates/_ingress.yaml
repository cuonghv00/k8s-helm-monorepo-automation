{{/*
================================================================================
  common-lib/_ingress.yaml
  Reusable template that renders a Kubernetes Ingress resource.
================================================================================
*/}}
{{- define "common-lib.ingress" -}}
{{- $fullName := include "common-lib.fullname" . -}}
{{- $svcPort := .Values.service.port | default 80 -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "common-lib.fullname" . }}
  labels:
    {{- include "common-lib.labels" . | nindent 4 }}
  annotations:
    {{- /* Nginx-specific default annotations if class is nginx or empty */}}
    {{- if eq (.Values.ingress.className | default "nginx") "nginx" }}
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "ImplementationSpecific" }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
