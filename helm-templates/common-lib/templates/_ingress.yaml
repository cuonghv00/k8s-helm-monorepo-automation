{{/*
================================================================================
  common-lib/_ingress.yaml
  Reusable template that renders a Kubernetes Ingress resource.
  
  Per-path servicePort supports both port name (string) and port number (int).
  If omitted, defaults to the first service port.
================================================================================
*/}}
{{- define "common-lib.ingress" -}}
{{- $fullName := include "common-lib.fullname" . -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "common-lib.fullname" . }}
  labels:
    {{- include "common-lib.labels" . | nindent 4 }}
  annotations:
    {{- /* Default Nginx annotations when className is 'nginx' (or not set) */}}
    {{- if eq (.Values.ingress.className | default "nginx") "nginx" }}
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "ImplementationSpecific" }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  {{- /*
                    Detect port type:
                    - Integer (float64 in Go templates) → render as 'number'
                    - String (port name like "http")    → render as 'name'
                  */}}
                  {{- if kindIs "float64" .servicePort }}
                  number: {{ .servicePort | int }}
                  {{- else }}
                  name: {{ .servicePort | quote }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
