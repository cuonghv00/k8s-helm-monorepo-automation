type: deployment
image:
  repository: registry.vn/gateway
  tag: latest
  pullPolicy: IfNotPresent
deployment:
  replicas: 3
  containerPort: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  strategy:
    type: RollingUpdate
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
      - ALL
  env:
  - name: LOG_LEVEL
    value: debug
  volumes:
  - name: config-volume
    configMap:
      name: api-gateway-config
  - name: api-gateway-tmp
    emptyDir: {}
  volumeMounts:
  - name: config-volume
    mountPath: /etc/config
  - name: api-gateway-tmp
    mountPath: /tmp
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
              - api-gateway
          topologyKey: kubernetes.io/hostname
serviceAccount:
  create: false
  name: ''
service:
  enabled: true
  type: ClusterIP
  port: 80
ingress:
  enabled: true
  className: nginx
  hosts:
  - host: api.my-platform.com
    paths:
    - path: /
      pathType: Prefix
