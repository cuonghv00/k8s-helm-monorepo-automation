type: deployment
image:
  repository: registry.vn/ecommerce/user-service
  tag: PIPELINE-TEST-888
  pullPolicy: IfNotPresent
deployment:
  replicas: 1
  containerPort: 3000
  resources: {}
  strategy:
    type: RollingUpdate
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
      - ALL
  imagePullSecrets:
  - name: regcred
  envFrom:
  - configMapRef:
      name: ecommerce-config
  env:
  - name: LOG_LEVEL
    value: debug
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ecommerce-secret
        key: DB_PASSWORD
  volumes:
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  affinity: {}
serviceAccount:
  create: false
  name: default
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
ingress: {}
pvc: {}
localConfig:
  enabled: false
