type: deployment
image:
  repository: registry.vn/ecommerce/user-service
  tag: latest
  pullPolicy: IfNotPresent
deployment:
  replicas: 1
  containerPort: 8080
  resources: {}
  strategy:
    type: RollingUpdate
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
      - ALL
  imagePullSecrets:
  - name: regcred
  envFrom:
  - configMapRef:
      name: ecommerce-config
  env:
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: ecommerce-secret
        key: DB_PASSWORD
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: ecommerce-secret
        key: JWT_SECRET
  volumes:
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  affinity: {}
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    httpGet:
      path: /liveness
      port: 8080
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 2
    timeoutSeconds: 2
    failureThreshold: 3
    httpGet:
      path: /health
      port: 8080
serviceAccount:
  create: false
  name: default
service: {}
ingress: {}
pvc: {}
localConfig:
  enabled: false
