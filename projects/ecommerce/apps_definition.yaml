project: "my-platform"
common_version: "1.0.0"

apps:
  - name: "api-gateway"
    type: "deployment"
    config:
      image_repo: "registry.vn/gateway"
      tag: "latest"
      port: 8080
      replicas: 3
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      # Default Security Context
      auto_mount_tmp: true
      security_context:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop:
            - ALL
      # Network: Enable Service & Ingress
      service:
        enabled: true
        type: ClusterIP
        port: 80
      ingress:
        enabled: true
        className: nginx
        hosts:
          - host: "api.my-platform.com"
            paths:
              - path: /
                pathType: Prefix
      # Environment variables
      env:
        - name: LOG_LEVEL
          value: "debug"
      # Custom volumes (optional)
      volumes:
        - name: config-volume
          configMap:
            name: api-gateway-config
      volume_mounts:
        - name: config-volume
          mountPath: /etc/config
      # Affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - api-gateway
              topologyKey: kubernetes.io/hostname

  - name: "user-service"
    type: "deployment"
    # This app uses the default security configuration from the generator and does not use Ingress
    config:
      image_repo: "registry.vn/user-service"
      port: 8081
      replicas: 2
      service:
        enabled: true
        type: ClusterIP
        port: 8081
      # No security_context override; generator will inject maximum hardening defaults.
      # Since auto_mount_tmp defaults to true, /tmp will be mounted as an emptyDir.

  - name: "payment-service"
    type: "deployment"
    config:
      image_repo: "registry.vn/payment-service"
      port: 8082
      replicas: 2
      # Override security_context: Run as root user for legacy dependency (example demonstration)
      security_context:
        readOnlyRootFilesystem: false
        runAsNonRoot: false
        runAsUser: 0
      service:
        enabled: true
        port: 80
      ingress:
        enabled: true
        className: my-cloud-alb # Custom ingress class
        annotations:
          alb.ingress.kubernetes.io/scheme: internet-facing
        hosts:
          - host: "payment.my-platform.com"
            paths:
              - path: /api/v1/pay
