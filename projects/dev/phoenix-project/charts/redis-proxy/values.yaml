type: deployment
image:
  repository: registry.vn/phoenix-project/redis-proxy
  tag: latest
  pullPolicy: IfNotPresent
deployment:
  replicas: 1
  containerPort: 6379
  ports:
  - name: http
    containerPort: 6379
    protocol: TCP
  resources: {}
  strategy:
    type: RollingUpdate
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
      - ALL
  envFrom:
  - configMapRef:
      name: phoenix-project-config
  env: []
  volumes:
  - name: tmp
    emptyDir: {}
  - name: data-volume
    persistentVolumeClaim:
      claimName: '{{ include "common-lib.fullname" . }}'
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: data-volume
    mountPath: /data
  affinity: {}
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    tcpSocket:
      port: 6379
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    tcpSocket:
      port: 6379
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    tcpSocket:
      port: 6379
  imagePullSecrets:
  - name: regcred
  podAnnotations: {}
serviceAccount:
  create: true
  name: null
  automountServiceAccountToken: false
service:
  enabled: false
ingress:
  enabled: false
pvc:
  enabled: true
  size: 10Gi
  storageClass: standard
  accessModes:
  - ReadWriteOnce
  mountPath: /data
localConfig:
  enabled: false
