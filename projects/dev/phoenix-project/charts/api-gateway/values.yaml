type: deployment
image:
  repository: registry.vn/phoenix-project/api-gateway
  tag: latest
  pullPolicy: IfNotPresent
deployment:
  replicas: 2
  containerPort: 80
  ports:
  - name: http
    containerPort: 80
    protocol: TCP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  strategy:
    type: RollingUpdate
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
      - ALL
  envFrom:
  - configMapRef:
      name: phoenix-project-config
  env: []
  volumes:
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  affinity: {}
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    tcpSocket:
      port: 80
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    tcpSocket:
      port: 80
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 30
    httpGet:
      path: /health
      port: 80
  imagePullSecrets:
  - name: regcred
  podAnnotations: {}
serviceAccount:
  create: true
  name: null
  automountServiceAccountToken: false
service:
  enabled: true
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
    nodePort: null
  annotations: {}
ingress:
  enabled: true
  host: api.example.com
  path: /
  annotations: {}
  className: nginx
  hosts:
  - host: api.example.com
    paths:
    - path: /
      pathType: ImplementationSpecific
      servicePort: 80
pvc:
  enabled: false
  size: 10Gi
  accessModes:
  - ReadWriteOnce
localConfig:
  enabled: false
