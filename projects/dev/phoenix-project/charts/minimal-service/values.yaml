type: deployment
image:
  repository: registry.vn/phoenix-project/minimal-service
  tag: latest
  pullPolicy: IfNotPresent
deployment:
  replicas: 1
  containerPort: 8080
  ports:
  - name: http
    containerPort: 8080
    protocol: TCP
  resources: {}
  strategy:
    type: RollingUpdate
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
      - ALL
  envFrom:
  - configMapRef:
      name: phoenix-project-config
  env: []
  volumes:
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  affinity: {}
  livenessProbe: null
  readinessProbe: null
  startupProbe: null
  imagePullSecrets:
  - name: regcred
  podAnnotations: {}
serviceAccount:
  create: true
  name: null
  automountServiceAccountToken: false
service:
  enabled: false
ingress:
  enabled: false
pvc:
  enabled: false
  size: 10Gi
  accessModes:
  - ReadWriteOnce
localConfig:
  enabled: false
