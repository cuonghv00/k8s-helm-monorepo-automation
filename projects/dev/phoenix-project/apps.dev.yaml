# projects/phoenix-project/apps.dev.yaml
# ==============================================================================
# Reference Project: E-commerce Platform
# Use this file as a guide for configuring different types of applications.
# ==============================================================================

project: "phoenix-project"
common_version: "1.0.0"
image_repo: "registry.vn/phoenix-project"
image_tag: "latest"

# 1. Global Project Variables (Injected via envFrom to all apps)
# These are defined in variables.env in the same directory.
# generator.py auto-creates a ConfigMap named 'phoenix-project-config'.

apps:
  # ----------------------------------------------------------------------------
  # EXAMPLE 1: Minimal Service (Simple)
  # Just name and port. Good for internal tools or auxiliary services.
  # ----------------------------------------------------------------------------
  - name: "minimal-service"
    port: 8080

  # ----------------------------------------------------------------------------
  # EXAMPLE 2: API Gateway (Intermediate)
  # Demonstrates Ingress, basic Health Checks, and Resource Limits.
  # ----------------------------------------------------------------------------
  - name: "api-gateway"
    port: 80
    replicas: 2
    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"
    ingress:
      enabled: true
      host: "api.example.com"
      path: "/"
    health:
      enabled: true      # Uses default HTTP check on '/'
      startup:
        path: "/health"
        failureThreshold: 30 # Allow 30 * 10s = 5 mins for slow startup
        periodSeconds: 10

  # ----------------------------------------------------------------------------
  # EXAMPLE 3: User Service (Advanced)
  # Demonstrates Env Variables, Secrets (from Vault), and Custom Port Mapping.
  # ----------------------------------------------------------------------------
  - name: "user-service"
    image_tag: "v1.2.3"  # Overrides global image_tag
    port: 3000           # Container port
    service:
      port: 80           # Service port (80) maps to Container port (3000)
    # env_vars: mapping these keys from Vault/SharedConfig
    env_vars:
      - DATABASE_URL     # From shared variables.env
      - DB_PASSWORD      # From Vault (injected via vault_sync.sh)
      - AUTH_SECRET      # From Vault
    env:                 # Ad-hoc environment variables
      - name: LOG_LEVEL
        value: "debug"

  # ----------------------------------------------------------------------------
  # EXAMPLE 4: Redis Proxy (Stateful/Storage)
  # Demonstrates TCP Health Checks and Persistence (PVC).
  # ----------------------------------------------------------------------------
  - name: "redis-proxy"
    port: 6379
    health:
      enabled: true
      # No 'path' provided -> generator.py auto-sets tcpSocket check
    pvc:
      enabled: true
      size: "10Gi"
      storageClass: "standard"
      mountPath: "/data"

  # ----------------------------------------------------------------------------
  # EXAMPLE 5: Order Service (Multi-Port Support)
  # NEW: Testing the multi-port and strict schema features.
  # ----------------------------------------------------------------------------
  - name: "order-service"
    type: "deployment"
    replicas: 1
    # Multiple ports definition
    ports:
      - name: "http"
        port: 80
        targetPort: 8080
      - name: "grpc"
        port: 50051
        targetPort: 50051
    service:
      type: "ClusterIP"
    # Hardened RBAC Security
    serviceAccount:
      create: true           # Creates order-service-sa
      automountToken: false  # Maximum Security
    ingress:
      enabled: true
      host: "orders.phoenix-project.vn"
      servicePort: "http" # Reference port by name
    health:
      enabled: true
      liveness: "/health" # Targets the primary port (first in the list)
