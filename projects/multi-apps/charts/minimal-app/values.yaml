type: deployment
image:
  repository: registry.vn/test/minimal-app
  tag: null
  pullPolicy: IfNotPresent
deployment:
  replicas: 1
  containerPort: 80
  resources: {}
  strategy:
    type: RollingUpdate
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
      - ALL
  imagePullSecrets:
  - name: regcred
  livenessProbe: null
  readinessProbe: null
  env:
  - name: DB_HOST
    valueFrom:
      configMapKeyRef:
        name: multi-apps-test-config
        key: DB_HOST
  volumes:
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  affinity: {}
serviceAccount:
  create: false
  name: default
service: {}
ingress: {}
genConfigMaps: false
