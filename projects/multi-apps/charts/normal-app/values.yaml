type: deployment
image:
  repository: registry.vn/test/normal-app
  tag: null
  pullPolicy: IfNotPresent
deployment:
  replicas: 1
  containerPort: 8080
  resources: {}
  strategy:
    type: RollingUpdate
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
      - ALL
  imagePullSecrets:
  - name: regcred
  livenessProbe: &id001
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  readinessProbe: *id001
  env:
  - name: DB_HOST
    valueFrom:
      configMapKeyRef:
        name: multi-apps-test-config
        key: DB_HOST
  - name: LOG_LEVEL
    valueFrom:
      configMapKeyRef:
        name: multi-apps-test-config
        key: LOG_LEVEL
  - name: DATABASE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: multi-apps-test-secret
        key: DATABASE_PASSWORD
  volumes:
  - name: tmp
    emptyDir: {}
  - name: env-file
    configMap:
      name: multi-apps-test-config
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: env-file
    mountPath: /app/.env
    subPath: .env
  affinity: {}
serviceAccount:
  create: false
  name: default
service: {}
ingress:
  enabled: true
  host: normal.example.com
genConfigMaps: false
