project: "multi-apps-test"
common_version: "1.0.0"
namespace: "test-ns"
image_repo: "registry.vn/test"
imagePullSecrets:
  - name: "regcred"

apps:
  # 1. Tối giản (Minimal) - Chỉ lấy DB_HOST
  - name: "minimal-app"
    env_vars:
      - DB_HOST

  # 2. Bình thường (Normal) - Lấy nhiều biến và mount thành file .env
  - name: "normal-app"
    port: 8080
    mount_env_file: true
    env_vars:
      - DB_HOST
      - LOG_LEVEL
      - DATABASE_PASSWORD
    ingress:
      enabled: true
      host: "normal.example.com"
    health:
      enabled: true
      path: "/healthz"

  # 3. Đầy đủ (Full) - Test ghi đè và lấy secret
  - name: "full-app"
    replicas: 3
    port: 9000
    env_vars:
      - DATABASE_PASSWORD
      - API_TOKEN
      - DOMAIN
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    securityContext:
      runAsUser: 2000
      readOnlyRootFilesystem: false
    env:
      - name: "APP_MODE"
        value: "production"
    ingress:
      enabled: true
      host: "full.example.com"
      annotations:
        kubernetes.io/ingress.class: "nginx"
    genConfigMaps: true
    volumes:
      - name: "custom-data"
        emptyDir: {}
    volumeMounts:
      - name: "custom-data"
        mountPath: "/data"
