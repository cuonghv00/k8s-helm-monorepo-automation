project: "testing"
common_version: "1.0.0"
namespace: testing
image_repo: "registry.vn/testing"
image_tag: "latest"

apps:
  - name: "app1"
    type: "deployment" # không khai báo trường này mặc định là deployment
    replicas: 1 # không khai báo trường này mặc định là 1
    strategy: "RollingUpdate" # không khai báo trường này mặc định là RollingUpdate, nếu khai báo thì khai báo chuẩn như trong k8s
    serviceAccount: "default" # không khai báo trường này mặc định là default, không tự động mount
    containers:
      # tên container mặc định là tên của app, tên image mặc định là image_repo + app_name + image_tag
      image: "điền tên image cụ thể nếu khác mặc định"
      securityContext:
      # không khai báo mặc định như bên dưới
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      # không khai báo mặc định
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "250m"
          memory: "512Mi"
    # không khai báo mặc định false
      health:
        enabled: true
        # mặc định nếu khai báo health enabled true thì sẽ có livenessProbe và readinessProbe
        livenessProbe:
          httpGet:
            path: "/health"
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: "/health"
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
    service:
      type: ClusterIP
      port: 8080
    ingress: # mặc định false
      enabled: true
      # mặc định nginx 
      ingressClassName: nginx
      host: "app1.testing.com"
      # mặc định /
      path: "/"
    env: # không khai báo mặc định rỗng, nếu khai báo thì khai báo chuẩn như trong k8s
      - name: "LOG_LEVEL"
        valueFrom:
          secretKeyRef:
            name: "app1-secret"
            key: "LOG_LEVEL"
    genConfigMaps: true
    volumes:
      # mặc định nếu genConfigMaps: true
      - name: "app1-config"
        configMap:
          name: "app1-config"
          items:
            - key: ".env"
              path: ".env"
      # mặc định sử dụng tmp  nếu sử dụng securityContext mặc định
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: "app1-config"
        mountPath: "/app/config"
        subPath: ".env"
      - name: tmp
        mountPath: "/tmp"
            

        