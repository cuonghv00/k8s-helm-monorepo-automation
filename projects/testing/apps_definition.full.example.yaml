# apps_definition.full.example.yaml
# Bản tham chiếu đầy đủ tất cả các trường cấu hình cho Operator.
# Các giá trị hiển thị ở đây là giá trị mặc định nếu không được khai báo.

project: "example-project"
common_version: "1.0.0" # Phiên bản của common-lib chart
namespace: default
image_repo: "registry.vn/example"
image_tag: "latest"
imagePullSecrets: # Mặc định: [{"name": "regcred"}]
  - name: "regcred"

apps:
  - name: "full-app-example"
    type: "deployment"       # Mặc định: deployment. Hỗ trợ: deployment, statefulset, cronjob
    replicas: 1              # Mặc định: 1
    strategy: "RollingUpdate" # Mặc định: RollingUpdate (dùng chuẩn K8s format)
    serviceAccount: "default" # Mặc định: default
    
    # Cấu hình Container chính
    # Nếu không khai báo image, sẽ tự động ghép: <image_repo>/<app_name>:<image_tag>
    image: "registry.vn/example/custom-image:v1" 
    
    # Security Context (Mặc định cực kỳ bảo mật - Hardened)
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
    
    # Tài nguyên (Mặc định giới hạn như bên dưới nếu không khai báo)
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    
    # Kiểm tra sức khỏe (Health Check)
    health:
      enabled: true # Mặc định: false
      # Khi enabled: true, mặc định sẽ tạo cả livenessProbe và readinessProbe giống nhau
      path: "/health" # Mặc định: /
      port: 8080      # Mặc định: 80
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
    
    # Nếu cần tách biệt liveness và readiness (Nâng cao)
    # livenessProbe:
    #   httpGet: { path: "/live", port: 8080 }
    # readinessProbe:
    #   httpGet: { path: "/ready", port: 8080 }

    # Cấu hình Service
    service:
      enabled: true       # Mặc định: true nếu có port
      type: ClusterIP     # Mặc định: ClusterIP
      port: 8080          # Port của container
      targetPort: 8080    # Mặc định: giống port

    # Cấu hình Ingress
    ingress:
      enabled: false      # Mặc định: false
      ingressClassName: nginx # Mặc định: nginx
      host: "app.example.com"
      path: "/"           # Mặc định: /
      tls: false          # Mặc định: false

    # Biến môi trường (Chuẩn K8s format)
    env:
      - name: "LOG_LEVEL"
        value: "INFO"
      - name: "DATABASE_URL"
        valueFrom:
          secretKeyRef:
            name: "db-secret"
            key: "url"

    # Tự động sinh ConfigMap từ các file trong thư mục config của project
    genConfigMaps: false # Mặc định: false

    # Volumes & Mounts
    # Ghi chú: Thư mục /tmp được tự động mount emptyDir nếu readOnlyRootFilesystem: true
    volumes:
      - name: "data"
        emptyDir: {}
    volumeMounts:
      - name: "data"
        mountPath: "/data"
