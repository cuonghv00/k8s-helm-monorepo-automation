type: deployment
image:
  repository: registry.vn/test/minimal-service
  tag: PIPELINE-123
  pullPolicy: IfNotPresent
deployment:
  replicas: 1
  containerPort: 80
  resources: {}
  strategy:
    type: RollingUpdate
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    capabilities:
      drop:
      - ALL
  imagePullSecrets:
  - name: regcred
  envFrom:
  - configMapRef:
      name: single-app-test-config
  env: []
  volumes:
  - name: tmp
    emptyDir: {}
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  affinity: {}
serviceAccount:
  create: false
  name: default
service: {}
ingress: {}
localConfig:
  enabled: false
