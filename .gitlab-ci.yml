# .gitlab-ci.yml
# ==============================================================================
# Helm Monorepo — Optimized Orchestration Pipeline
# ==============================================================================

stages:
  - sync-secrets
  - deploy-orchestration

variables:
  # Default project for the pipeline
  PROJECT: "ecommerce"
  ENV: "dev"
  # Vault configurations
  VAULT_ADDR: "https://vault.example.com"
  TEAM: "ops-team"

# Base configuration for scripts
.base-script:
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y git jq curl unzip
    - pip install pyyaml
    # Set up Git for pushback (Requires CI_PUSH_TOKEN in GitLab variables)
    - git config --global user.name "GitOps Bot"
    - git config --global user.email "bot@devops.vn"
    # Use CI_JOB_TOKEN or an SSH/Personal Token for pushing to the repo
    - git remote set-url origin "https://oauth2:${GITLAB_API_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

# 1. Sync Secrets from Vault (K8s or VM mode)
sync-vault-secrets:
  stage: sync-secrets
  extends: .base-script
  script:
    - chmod +x scripts/vault_sync.sh
    # New syntax: ./vault_sync.sh <vault_path> <secret_name> <namespace>
    - ./scripts/vault_sync.sh "secret/data/${TEAM}/${PROJECT}/${ENV}" "${PROJECT}-secret" "${PROJECT}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - projects/$PROJECT/apps.$ENV.yaml
        - scripts/vault_sync.sh

# 2. Orchestrate Deployment (Generate, Commit, and Push back)
deploy-orchestration:
  stage: deploy-orchestration
  extends: .base-script
  resource_group: git-push-lock # Avoid concurrent push conflicts
  script:
    - chmod +x scripts/deploy.sh
    # Automatically uses $CI_PIPELINE_ID as image tag for immutability
    - ./scripts/deploy.sh --project "$PROJECT" --env "$ENV" --image-tag "$CI_PIPELINE_ID"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - projects/$PROJECT/apps.$ENV.yaml
        - helm-templates/**/*
        - scripts/deploy.sh
        - scripts/generator.py
