# ============================================================================
#  .gitlab-ci.yml
#  Helm Monorepo — CI/CD Pipeline
#
#  Responsibilities:
#    1. build-image: Build & push Docker image, capture new tag
#    2. update-chart-image: Update images.yaml in Git via the GitLab Commits API
#       - Uses resource_group to serialize updates and prevent 409 conflicts
#       - Commit message includes [skip ci] to avoid recursive pipeline triggers
# ============================================================================

stages:
  - generate
  - sync-secrets
  - build
  - update-chart

# ---------------------------------------------------------------------------
# Global variables — override per project / per job as needed
# ---------------------------------------------------------------------------
variables:
  # Base project configuration
  PROJECT_NAME: "multi-apps"             # Default for testing
  TEAM_NAME: "ops-team"                  # Your Vault team prefix
  ENVIRONMENT: "dev"                     # dev, staging, prod
  REGISTRY: "registry.vn"               # Your container registry host
  COMMON_LIB_VERSION: "1.0.0"

# ---------------------------------------------------------------------------
# Stage 0: Synchronize Helm charts from definition
# ---------------------------------------------------------------------------
sync-charts:
  stage: generate
  image: python:3.11-slim
  script:
    - pip install pyyaml
    - |
      python3 scripts/generator.py --project "$PROJECT_NAME" --env "$ENVIRONMENT"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - projects/$PROJECT_NAME/apps.$ENVIRONMENT.yaml
        - projects/$PROJECT_NAME/variables.env
        - helm-templates/**/*
        - scripts/generator.py
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# Stage 1: Synchronize secrets from Vault (KV v2)
# ---------------------------------------------------------------------------
sync-vault-secrets:
  stage: sync-secrets
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq bash
    # Install Vault CLI
    - curl -sSL https://releases.hashicorp.com/vault/1.15.4/vault_1.15.4_linux_amd64.zip -o vault.zip && unzip vault.zip && mv vault /usr/local/bin/ && rm vault.zip
    # Install kubectl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" && chmod +x kubectl && mv kubectl /usr/local/bin/
  script:
    - chmod +x scripts/vault_sync.sh
    - ./scripts/vault_sync.sh "$TEAM_NAME" "$PROJECT_NAME" "$ENVIRONMENT" "$PROJECT_NAME"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH == "main"'
      changes:
        - projects/$PROJECT_NAME/apps.$ENVIRONMENT.yaml
        - projects/$PROJECT_NAME/variables.env
        - scripts/vault_sync.sh
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# Stage 1: Build & push Docker image
# ---------------------------------------------------------------------------
build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    IMAGE_TAG: "${CI_PIPELINE_IID}"      # Unique, monotonically increasing tag per pipeline
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - |
      export FULL_IMAGE="${REGISTRY}/${APP_NAME}:${IMAGE_TAG}"
      echo "Building image: ${FULL_IMAGE}"
      docker build -t "${FULL_IMAGE}" .
      docker push "${FULL_IMAGE}"
      # Persist the tag for the next stage
      echo "IMAGE_TAG=${IMAGE_TAG}" > build.env
  artifacts:
    reports:
      # Pass IMAGE_TAG to downstream jobs
      dotenv: build.env
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^release\//'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# Stage 2: Update images.yaml in Git via GitLab Commits API
#
# Why API instead of git push?
#   - git push inside CI requires SSH keys and adds pipeline overhead.
#   - The Commits API is atomic and works cleanly with resource_group.
#
# Why resource_group?
#   - Multiple apps can trigger this stage simultaneously.
#   - resource_group: helm-images-update ensures only ONE job runs at a time,
#     preventing concurrent writes to the same branch → 409 Conflict.
#
# Why [skip ci]?
#   - The commit updating images.yaml should NOT trigger another pipeline.
# ---------------------------------------------------------------------------
update-chart-image:
  stage: update-chart
  image: alpine/curl:8
  # CRITICAL: Serialize all image update commits across every app pipeline.
  # This prevents concurrent API calls that result in 409 Conflict errors.
  resource_group: helm-images-update
  needs:
    - job: build-image
      artifacts: true   # Inherit IMAGE_TAG from build.env
  script:
    - |
      set -euo pipefail

      if [ -n "$PROJECT_NAME" ]; then
        TARGET_FILE="projects/${PROJECT_NAME}/charts/${APP_NAME}/images.yaml"
      else
        TARGET_FILE="charts/${APP_NAME}/images.yaml"
      fi
      COMMIT_BRANCH="${CI_DEFAULT_BRANCH:-main}"

      # Build the new images.yaml content (base64-encoded for the API payload)
      NEW_CONTENT=$(printf 'image:\n  tag: "%s"\n' "${IMAGE_TAG}" | base64 -w 0)

      echo "Updating ${TARGET_FILE} with tag=${IMAGE_TAG} on branch=${COMMIT_BRANCH}"

      # Call the GitLab Repository Files API to update (or create) the file
      HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
        --request PUT \
        --header "PRIVATE-TOKEN: ${GITLAB_API_TOKEN}" \
        --header "Content-Type: application/json" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/files/$(python3 -c "import urllib.parse; print(urllib.parse.quote('${TARGET_FILE}', safe=''))")" \
        --data "{
          \"branch\": \"${COMMIT_BRANCH}\",
          \"content\": \"$(printf 'image:\n  tag: \"%s\"\n' "${IMAGE_TAG}")\",
          \"commit_message\": \"ci: update ${APP_NAME} image tag to ${IMAGE_TAG} [skip ci]\"
        }")

      echo "GitLab API response: HTTP ${HTTP_STATUS}"
      if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
        echo "ERROR: GitLab API call failed with status ${HTTP_STATUS}"
        exit 1
      fi

      echo "✅  Successfully updated ${TARGET_FILE}"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH =~ /^release\//'
    - if: '$CI_PIPELINE_SOURCE == "web"'
