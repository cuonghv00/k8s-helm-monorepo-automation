# argocd/applicationset.yaml
# ==============================================================================
# ArgoCD ApplicationSet to automatically discover and deploy all microservices
# within the Platform Repo.
#
# Logic:
# 1. Scans `projects/*/charts/*` for directories.
# 2. Creates an ArgoCD Application for each service.
# 3. Uses the project name as the target Kubernetes namespace.
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-monorepo-apps
  namespace: argocd
spec:
  generators:
    - git:
        # Update this to your platform repo URL
        repoURL: https://github.com/cuonghv00/gitops-engine.git
        revision: HEAD
        directories:
          - path: projects/*/charts/*
  template:
    metadata:
      # App name = service name (e.g., user-service)
      name: '{{path.basename}}'
      labels:
        project: '{{path.segments[1]}}'
        env: '{{path.segments[0]}}' # Usually projects/ecommerce/charts/... 
                                    # Actually path is projects/ecommerce/charts/user-service
                                    # segments: 0: projects, 1: ecommerce, 2: charts, 3: user-service
    spec:
      # Grouping by ArgoCD Project
      project: '{{path.segments[1]}}'
      source:
        repoURL: https://github.com/cuonghv00/gitops-engine.git
        targetRevision: HEAD
        path: '{{path}}'
        helm:
          # Automatically use the values.yaml generated by CI
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        # Namespace = project name (e.g., ecommerce)
        namespace: '{{path.segments[1]}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
