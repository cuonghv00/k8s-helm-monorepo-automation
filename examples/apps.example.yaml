# examples/apps.example.yaml
# ==============================================================================
# Comprehensive Application Definition Example
# Use this as a template for your project configuration.
# ==============================================================================

project: "example-project"
common_version: "1.0.0"
image_repo: "registry.vn/example"
image_tag: "v1.0.0"

imagePullSecrets:
  - name: "regcred-global"

# ------------------------------------------------------------------------------
# Project-level PVCs — lifecycle managed INDEPENDENTLY from app charts.
# Reference them in app volumes via `pvc: <name>`.
# ------------------------------------------------------------------------------
pvcs:
  - name: "shared-storage"
    size: "50Gi"
    storageClass: "nfs-client"
    accessModes:
      - ReadWriteMany

  - name: "db-data"
    size: "20Gi"
    storageClass: "fast-ssd"

apps:
  # ----------------------------------------------------------------------------
  # CASE 1: Simple Web Service
  # ----------------------------------------------------------------------------
  - name: "web-portal"
    port: 80
    replicas: 2
    ingress:
      enabled: true
      host: "portal.example.com"
    health:
      enabled: true

  # ----------------------------------------------------------------------------
  # CASE 2: Flattened Envs — all env declaration styles
  # ----------------------------------------------------------------------------
  - name: "backend-api"
    port: 3000
    service:
      port: 80           # Service port 80 → container port 3000

    envs:
      # Style 1: Plain value
      - name: LOG_LEVEL
        value: "debug"

      # Style 2: Per-key secretKeyRef (Vault-synced secret → K8s Secret)
      # Injects each key as its own env var via secretKeyRef
      - secretEnv: example-project-secret
        vars:
          - DATABASE_URL
          - API_KEY

      # Style 3: Inject all keys from a ConfigMap via envFrom
      - configMap: global-feature-flags

      # Style 4: Inject all keys from a Secret via envFrom
      - secret: external-api-keys

      # Style 5: Raw K8s EnvVar spec (escape hatch for complex cases)
      # k8s: Native K8s EnvVar spec — for Downward API, resourceFieldRef, etc.
      - k8s:
          name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

      - k8s:
          name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

  # ----------------------------------------------------------------------------
  # CASE 3: Flattened Volumes — all volume source types + mount options
  # ----------------------------------------------------------------------------
  - name: "data-processor"
    port: 8080

    volumes:
      # PVC reference (must be declared in project pvcs: above)
      - name: shared-data
        mountPath: /mnt/shared
        pvc: shared-storage
        readOnly: true
        mountPropagation: None

      # Read-write PVC
      - name: db-storage
        mountPath: /var/lib/db
        pvc: db-data

      # EmptyDir (in-memory)
      - name: memory-cache
        mountPath: /tmp/cache
        emptyDir:
          medium: Memory
          sizeLimit: "256Mi"

      # EmptyDir (default disk-backed)
      - name: work-dir
        mountPath: /tmp/work
        emptyDir: {}

      # HostPath — access node filesystem
      - name: host-logs
        mountPath: /var/log/app
        hostPath:
          path: /var/log/nodes
          type: DirectoryOrCreate

      # ConfigMap mounted as directory of files
      - name: app-config
        mountPath: /etc/config
        configMap:
          name: special-config
          items:
            - key: settings.json
              path: settings.json

      # ConfigMap shorthand (mount entire CM as directory)
      - name: nginx-conf
        mountPath: /etc/nginx/conf.d
        configMap: nginx-config

      # Secret mounted as files (e.g. TLS certs, SSH keys)
      - name: tls-certs
        mountPath: /etc/ssl/certs
        readOnly: true
        secret:
          secretName: tls-cert
          items:
            - key: tls.crt
              path: tls.crt
            - key: tls.key
              path: tls.key

      # Secret shorthand
      - name: api-token
        mountPath: /run/secrets/token
        secret: api-token-secret

      # k8s: Full K8s Volume + VolumeMount spec — NFS, CSI, Projected, etc.
      - k8s:
          volume:
            name: nfs-archive
            nfs:
              server: nfs.example.com
              path: /exports/archive
          mount:
            mountPath: /mnt/archive
            readOnly: true

  # ----------------------------------------------------------------------------
  # CASE 4: Stateful Service (legacy pvc field — still works for simple cases)
  # ----------------------------------------------------------------------------
  - name: "redis-cache"
    port: 6379
    health:
      enabled: true
    pvc:
      enabled: true
      size: "20Gi"
      storageClass: "fast-storage"
      mountPath: "/data"
    securityContext:
      runAsUser: 999
      readOnlyRootFilesystem: false

  # ----------------------------------------------------------------------------
  # CASE 5: Multi-Port Service with RBAC + combined env sources
  # ----------------------------------------------------------------------------
  - name: "order-service"
    ports:
      - name: http
        port: 80
        targetPort: 8080
      - name: grpc
        port: 50051
        targetPort: 50051
    serviceAccount:
      create: true
      automountToken: false

    envs:
      - name: ENV
        value: "production"
      - secretEnv: order-service-secret
        vars:
          - DB_PASSWORD
          - STRIPE_SECRET
      - configMap: global-config

    ingress:
      enabled: true
      host: "orders.example.com"
      servicePort: "http"
    health:
      enabled: true
      liveness: "/health"
      readiness: "/ready"

  # ----------------------------------------------------------------------------
  # CASE 6: Advanced Ingress — Multiple hosts/paths + annotations
  # ----------------------------------------------------------------------------
  - name: "admin-panel"
    port: 3000
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      hosts:
        - host: "admin.example.com"
          paths:
            - path: "/internal"
              pathType: "Prefix"
            - path: "/static"
              pathType: "ImplementationSpecific"
